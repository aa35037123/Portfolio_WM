services:
  web:
    build:
      context: .
      target: dev
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  preview:
    build:
      context: .
      target: preview
    ports:
      - "4321:4321"

volumes:
  node_modules:
